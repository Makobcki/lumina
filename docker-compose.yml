version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:v1.15.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./infra/qdrant/config.yaml:/qdrant/config/production.yaml:ro
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: lumina
      POSTGRES_USER: lumina
      POSTGRES_PASSWORD: lumina
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumina -d lumina"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  inference:
    build:
      context: ./services/inference
    env_file:
      - .env
    environment:
      LUMINA_VECTOR_SIZE: "1024"
      LUMINA_EMBED_MODEL: "BAAI/bge-m3"
      LUMINA_RERANKER_MODEL: "BAAI/bge-reranker-v2-m3"
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/health"]
      interval: 20s
      timeout: 5s
      retries: 8
      start_period: 40s

  gateway:
    build:
      context: ./services/gateway
    env_file:
      - .env
    depends_on:
      inference:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  qdrant_storage:
  postgres_data:
