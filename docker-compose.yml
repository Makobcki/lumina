services:
  qdrant:
    image: qdrant/qdrant:v1.15.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./infra/qdrant/config.yaml:/qdrant/config/production.yaml:ro
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: lumina
      POSTGRES_USER: lumina
      POSTGRES_PASSWORD: lumina
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumina -d lumina"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  inference:
    build:
      context: ./services/inference
      args:
        LUMINA_EMBED_MODEL: "BAAI/bge-m3"
        LUMINA_RERANKER_MODEL: "BAAI/bge-reranker-v2-m3"
      cache_from:
        - type=local,src=.docker-cache/inference
      cache_to:
        - type=local,dest=.docker-cache/inference,mode=max
    env_file:
      - .env
    environment:
      LUMINA_VECTOR_SIZE: "1024"
      LUMINA_EMBED_MODEL: "BAAI/bge-m3"
      LUMINA_RERANKER_MODEL: "BAAI/bge-reranker-v2-m3"
      HF_HOME: "/models/huggingface"
    ports:
      - "8001:8001"
    volumes:
      - hf_cache:/models/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/health"]
      interval: 20s
      timeout: 5s
      retries: 8
      start_period: 40s

  gateway:
    build:
      context: ./services/gateway
      cache_from:
        - type=local,src=.docker-cache/gateway
      cache_to:
        - type=local,dest=.docker-cache/gateway,mode=max
    env_file:
      - .env
    depends_on:
      inference:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      - gateway
      - inference

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

volumes:
  qdrant_storage:
  postgres_data:
  hf_cache:
  prometheus_data:
  grafana_data:
